<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Connect — BNI前夜祭</title>
<style>
  :root {
    --bg: #121318; --card: #1B1D24; --text: #EAEAEA; --text-dim: #8B8FA0; --border: #2A2D38;
    --accent: #CF2030; --accent-dark: #A81A28; --gold: #C9A84C;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: "Helvetica Neue","Hiragino Sans","Noto Sans JP",sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 20px; -webkit-font-smoothing: antialiased;
  }
  .logo {
    width: 64px; height: 64px; border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 1.4rem; color: #fff; margin-bottom: 28px;
    box-shadow: 0 8px 24px rgba(207,32,48,0.25);
  }
  h1 {
    font-size: 2.6rem; font-weight: 900; letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 10px; text-align: center;
  }
  .subtitle { color: var(--text-dim); font-size: 0.95rem; margin-bottom: 16px; text-align: center; }
  .event-info {
    color: var(--text-dim); font-size: 0.82rem; margin-bottom: 48px; text-align: center;
    padding: 14px 28px; border: 1px solid var(--border); border-radius: 14px; background: var(--card);
  }
  .event-info strong { color: var(--gold); }

  .buttons { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 380px; }
  .btn {
    display: flex; flex-direction: column; align-items: center;
    padding: 26px 24px; border-radius: 18px; text-decoration: none;
    font-weight: 700; transition: all 0.3s; text-align: center;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff; border: none; font-size: 1.15rem;
    box-shadow: 0 4px 20px rgba(207,32,48,0.25);
  }
  .btn-primary:hover { opacity: 0.92; }
  .btn-secondary {
    background: var(--card); color: var(--text); border: 1px solid var(--border); font-size: 1.05rem;
  }
  .btn-secondary:hover { border-color: var(--gold); }
  .btn .desc { font-size: 0.8rem; font-weight: 400; opacity: 0.6; margin-top: 6px; }
</style>
</head>
<body>
  <div class="logo">AI</div>
  <h1>AI Connect</h1>
  <p class="subtitle">あなたにぴったりのグループを見つけます</p>
  <div class="event-info">
    <strong>BNI National Conference 前夜祭</strong><br>
    2026年4月27日（日）ベルサール汐留
  </div>
  <div class="buttons">
    <a href="form.html" class="btn btn-primary">
      📝 アンケートに回答する
      <span class="desc">Answer the Survey (2 min)</span>
    </a>
    <a href="result.html" class="btn btn-secondary">
      🔍 グループを確認する
      <span class="desc">Check Your Group</span>
    </a>
  </div>
</body>
</html>
