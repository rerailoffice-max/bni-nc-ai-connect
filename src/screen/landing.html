<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Connect — BNI前夜祭</title>
<style>
  :root {
    --bni-red: #CF2030; --bni-red-dark: #A81A28; --bni-gold: #C9A84C;
    --bg: #0D0D0D; --card-bg: #1A1A1A; --text: #FFFFFF; --text-dim: #888; --border: #333;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: "Helvetica Neue","Hiragino Sans","Noto Sans JP",sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .logo {
    width: 64px; height: 64px; background: var(--bni-red); border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 1.4rem; margin-bottom: 24px;
  }
  h1 {
    font-size: 2.8rem; font-weight: 900;
    background: linear-gradient(135deg, var(--bni-red), var(--bni-gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 8px; text-align: center;
  }
  .subtitle { color: var(--text-dim); font-size: 1rem; margin-bottom: 12px; text-align: center; }
  .event-info {
    color: var(--text-dim); font-size: 0.85rem; margin-bottom: 48px; text-align: center;
    padding: 12px 24px; border: 1px solid var(--border); border-radius: 12px;
    background: rgba(255,255,255,0.02);
  }
  .event-info strong { color: var(--bni-gold); }

  .buttons { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 400px; }
  .btn {
    display: flex; flex-direction: column; align-items: center;
    padding: 28px 24px; border-radius: 20px; text-decoration: none;
    font-weight: 700; transition: all 0.3s; text-align: center;
  }
  .btn-primary {
    background: var(--bni-red); color: var(--text); border: 2px solid var(--bni-red);
    font-size: 1.2rem;
  }
  .btn-primary:hover { background: var(--bni-red-dark); border-color: var(--bni-red-dark); }
  .btn-secondary {
    background: transparent; color: var(--text); border: 2px solid var(--border);
    font-size: 1.1rem;
  }
  .btn-secondary:hover { border-color: var(--bni-gold); }
  .btn .desc { font-size: 0.82rem; font-weight: 400; opacity: 0.7; margin-top: 6px; }

  .elements {
    display: flex; gap: 12px; margin-top: 48px; opacity: 0.5;
  }
  .element-badge {
    display: flex; align-items: center; gap: 4px;
    padding: 6px 12px; border-radius: 100px; font-size: 0.78rem; font-weight: 600;
  }
  .element-badge.fire { background: rgba(207,32,48,0.15); color: #FF6B7A; }
  .element-badge.wind { background: rgba(33,150,243,0.15); color: #64B5F6; }
  .element-badge.earth { background: rgba(255,193,7,0.15); color: #FFD54F; }
  .element-badge.water { background: rgba(76,175,80,0.15); color: #81C784; }

  .footer { margin-top: 40px; font-size: 0.75rem; color: #444; text-align: center; }
</style>
</head>
<body>
  <div class="logo">AI</div>
  <h1>AI Connect</h1>
  <p class="subtitle">パワーチーム × 行動特性 AIグループ編成</p>
  <div class="event-info">
    <strong>BNI National Conference 前夜祭</strong><br>
    2026年4月27日（日）ベルサール汐留
  </div>

  <div class="buttons">
    <a href="form.html" class="btn btn-primary">
      📝 アンケートに回答する
      <span class="desc">Answer the Survey (2 min)</span>
    </a>
    <a href="result.html" class="btn btn-secondary">
      🔍 グループを確認する
      <span class="desc">Check Your Group</span>
    </a>
  </div>

  <div class="elements">
    <span class="element-badge fire">🔥 炎</span>
    <span class="element-badge wind">🌀 風</span>
    <span class="element-badge earth">🌿 大地</span>
    <span class="element-badge water">💧 水</span>
  </div>

  <p class="footer">Powered by AI Connect × Gemini</p>
</body>
</html>
