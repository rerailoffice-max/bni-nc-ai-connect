<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Connect — Survey</title>
<style>
  :root {
    --bg: #121318; --card: #1B1D24; --card-raised: #22252E;
    --text: #EAEAEA; --text-dim: #8B8FA0; --text-muted: #555A6E;
    --border: #2A2D38; --border-light: #353845;
    --accent: #CF2030; --accent-dark: #A81A28; --accent-glow: rgba(207,32,48,0.15);
    --gold: #C9A84C; --gold-glow: rgba(201,168,76,0.12);
    --input-bg: #16181E;
    --fire: #E8453C; --wind: #4A9EF5; --earth: #E8A830; --water: #45B36B;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: "Helvetica Neue","Hiragino Sans","Noto Sans JP",sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ヘッダー */
  .header {
    text-align: center; padding: 36px 20px 24px;
    background: linear-gradient(180deg, rgba(207,32,48,0.08) 0%, transparent 60%);
  }
  .header h1 {
    font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .header p { color: var(--text-dim); margin-top: 6px; font-size: 0.85rem; }

  /* フォームコンテナ */
  .form-container { width: 100%; max-width: 520px; margin: 0 auto; padding: 0 16px 48px; }

  /* セクション */
  .section {
    margin-bottom: 20px; background: var(--card); border-radius: 20px;
    padding: 24px 20px; border: 1px solid var(--border);
  }
  .section-label {
    font-size: 0.7rem; font-weight: 700; color: var(--gold); text-transform: uppercase;
    letter-spacing: 0.12em; margin-bottom: 20px;
  }

  /* フィールド */
  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  .field-label {
    display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 8px;
  }
  .field-label .sub { color: var(--text-dim); font-weight: 400; font-size: 0.75rem; margin-left: 4px; }
  .field-label .req { color: var(--accent); margin-left: 2px; }

  input[type="text"], input[type="tel"] {
    width: 100%; padding: 14px 16px; background: var(--input-bg);
    border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); font-size: 0.95rem; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  input::placeholder { color: var(--text-muted); }

  /* ===== 業種選択 ===== */
  .ind-section { margin-bottom: 4px; }
  .ind-tabs {
    display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 12px;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .ind-tabs::-webkit-scrollbar { display: none; }
  .ind-tab {
    padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--input-bg); color: var(--text-dim); font-size: 0.78rem; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: all 0.2s; flex-shrink: 0;
  }
  .ind-tab:hover { border-color: var(--border-light); color: var(--text); }
  .ind-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .ind-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px;
  }
  .ind-item {
    padding: 12px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--input-bg); color: var(--text-dim); font-size: 0.82rem;
    cursor: pointer; transition: all 0.2s; text-align: center; font-weight: 500;
  }
  .ind-item:hover { border-color: var(--border-light); color: var(--text); background: var(--card-raised); }
  .ind-item.selected {
    border-color: var(--accent); background: var(--accent-glow); color: var(--accent); font-weight: 700;
  }
  .ind-item.hidden { display: none; }
  .ind-chosen {
    margin-top: 12px; padding: 10px 16px; border-radius: 10px; font-size: 0.85rem;
    background: var(--accent-glow); color: var(--accent); font-weight: 600; display: none;
    border: 1px solid rgba(207,32,48,0.2);
  }
  .ind-chosen.visible { display: flex; align-items: center; gap: 8px; }
  .ind-chosen .x {
    margin-left: auto; cursor: pointer; opacity: 0.6; font-size: 0.9rem;
  }
  .ind-chosen .x:hover { opacity: 1; }

  /* ===== ターゲット顧客 ===== */
  .target-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .target-chip {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 12px 10px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--input-bg); color: var(--text-dim); font-size: 0.8rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .target-chip input { display: none; }
  .target-chip:hover { border-color: var(--border-light); color: var(--text); }
  .target-chip.checked {
    border-color: var(--gold); background: var(--gold-glow); color: var(--gold); font-weight: 700;
  }
  .target-hint { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 10px; }

  /* ===== DISC診断 ===== */
  .q-block { margin-bottom: 28px; }
  .q-block:last-child { margin-bottom: 0; }
  .q-title { font-size: 0.92rem; font-weight: 700; margin-bottom: 3px; }
  .q-sub { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 14px; }

  .disc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .disc-card {
    padding: 16px 14px; border: 1.5px solid var(--border); border-radius: 14px;
    background: var(--input-bg); cursor: pointer; transition: all 0.25s;
    display: flex; flex-direction: column; align-items: center; text-align: center;
  }
  .disc-card:hover { border-color: var(--border-light); background: var(--card-raised); }
  .disc-card input { display: none; }
  .disc-card .icon { font-size: 1.6rem; margin-bottom: 8px; }
  .disc-card .ja { font-size: 0.82rem; font-weight: 600; line-height: 1.4; }
  .disc-card .en { font-size: 0.68rem; color: var(--text-muted); line-height: 1.3; margin-top: 4px; }

  .disc-card.sel-fire { border-color: var(--fire); background: rgba(232,69,60,0.08); }
  .disc-card.sel-fire .ja { color: var(--fire); }
  .disc-card.sel-wind { border-color: var(--wind); background: rgba(74,158,245,0.08); }
  .disc-card.sel-wind .ja { color: var(--wind); }
  .disc-card.sel-earth { border-color: var(--earth); background: rgba(232,168,48,0.08); }
  .disc-card.sel-earth .ja { color: var(--earth); }
  .disc-card.sel-water { border-color: var(--water); background: rgba(69,179,107,0.08); }
  .disc-card.sel-water .ja { color: var(--water); }

  /* 送信ボタン */
  .submit-btn {
    width: 100%; padding: 18px; border-radius: 14px; border: none; margin-top: 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff; font-size: 1.05rem; font-weight: 700; cursor: pointer;
    transition: opacity 0.2s; box-shadow: 0 4px 20px rgba(207,32,48,0.25);
  }
  .submit-btn:hover { opacity: 0.92; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* メッセージ */
  .msg {
    padding: 14px 16px; border-radius: 12px; margin-bottom: 16px; display: none; font-size: 0.85rem;
  }
  .msg.error {
    display: block; background: rgba(207,32,48,0.1); border: 1px solid rgba(207,32,48,0.2);
    color: #FF6B7A;
  }

  /* ローディング */
  .loading { display: none; text-align: center; padding: 48px 20px; }
  .loading.active { display: block; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: var(--text-dim); font-size: 0.88rem; }

  /* モバイル調整 */
  @media (max-width: 420px) {
    .disc-grid { grid-template-columns: 1fr; }
    .ind-grid { grid-template-columns: 1fr 1fr; }
    .target-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>AI Connect</h1>
  <p>BNI National Conference 前夜祭</p>
</div>

<div class="form-container">
  <div id="msg-area"></div>

  <form id="form" onsubmit="return send(event)">

    <!-- 基本情報 -->
    <div class="section">
      <div class="section-label">Basic Info</div>
      <div class="field">
        <label class="field-label">氏名 <span class="sub">/ Name</span><span class="req">*</span></label>
        <input type="text" name="name" placeholder="大城 良樹 / Yoshiki Oshiro" required>
      </div>
      <div class="field">
        <label class="field-label">チャプター <span class="sub">/ Chapter</span><span class="req">*</span></label>
        <input type="text" name="chapter" placeholder="ジャンヌ / Jeanne" required>
      </div>
      <div class="field">
        <label class="field-label">カテゴリー <span class="sub">/ Category</span><span class="req">*</span></label>
        <input type="text" name="category" placeholder="業務自動化のAI顧問" required>
      </div>
      <div class="field">
        <label class="field-label">電話番号 <span class="sub">/ Phone</span><span class="req">*</span></label>
        <input type="tel" name="phone" placeholder="090-1234-5678" required>
      </div>
    </div>

    <!-- 業種 -->
    <div class="section">
      <div class="section-label">Industry</div>
      <label class="field-label">業種を選択 <span class="sub">/ Select your industry</span><span class="req">*</span></label>
      <input type="hidden" name="industry" id="ind-val" required>
      <div class="ind-tabs" id="ind-tabs"></div>
      <div class="ind-grid" id="ind-grid"></div>
      <div class="ind-chosen" id="ind-chosen"><span id="ind-chosen-text"></span><span class="x" onclick="clearIndustry()">&times;</span></div>
    </div>

    <!-- ターゲット -->
    <div class="section">
      <div class="section-label">Target Customers</div>
      <label class="field-label">ターゲット顧客層<span class="req">*</span></label>
      <p class="target-hint">最大3つまで選択 / Select up to 3</p>
      <div class="target-grid" id="tgt-grid">
        <label class="target-chip" onclick="tgtToggle(this)"><input type="checkbox" name="tgt" value="個人（一般消費者）">個人（消費者）</label>
        <label class="target-chip" onclick="tgtToggle(this)"><input type="checkbox" name="tgt" value="個人事業主・フリーランス">個人事業主</label>
        <label class="target-chip" onclick="tgtToggle(this)"><input type="checkbox" name="tgt" value="中小企業（従業員30名以下）">中小企業</label>
        <label class="target-chip" onclick="tgtToggle(this)"><input type="checkbox" name="tgt" value="中堅企業（従業員31-300名）">中堅企業</label>
        <label class="target-chip" onclick="tgtToggle(this)"><input type="checkbox" name="tgt" value="大企業（従業員301名以上）">大企業</label>
        <label class="target-chip" onclick="tgtToggle(this)"><input type="checkbox" name="tgt" value="飲食・小売店舗">飲食・小売</label>
        <label class="target-chip" onclick="tgtToggle(this)"><input type="checkbox" name="tgt" value="医療・福祉施設">医療・福祉</label>
        <label class="target-chip" onclick="tgtToggle(this)"><input type="checkbox" name="tgt" value="不動産オーナー">不動産オーナー</label>
        <label class="target-chip" onclick="tgtToggle(this)"><input type="checkbox" name="tgt" value="富裕層・高所得者">富裕層</label>
        <label class="target-chip" onclick="tgtToggle(this)"><input type="checkbox" name="tgt" value="海外企業・外国人">海外・外国人</label>
      </div>
    </div>

    <!-- 行動スタイル -->
    <div class="section">
      <div class="section-label">Your Style</div>

      <div class="q-block">
        <p class="q-title">Q1. ビジネスで最もワクワクする瞬間は？</p>
        <p class="q-sub">When do you feel most excited in business?</p>
        <div class="disc-grid">
          <label class="disc-card" data-c="fire" onclick="disc(this,'q7')"><input type="radio" name="q7" value="A" required><span class="icon">🔥</span><span class="ja">大きな決断を下し即行動</span><span class="en">Bold decisions & action</span></label>
          <label class="disc-card" data-c="wind" onclick="disc(this,'q7')"><input type="radio" name="q7" value="B"><span class="icon">🌀</span><span class="ja">新しい人と出会い語り合う</span><span class="en">Meeting people & ideas</span></label>
          <label class="disc-card" data-c="earth" onclick="disc(this,'q7')"><input type="radio" name="q7" value="C"><span class="icon">🌿</span><span class="ja">チームで着実に成果を出す</span><span class="en">Steady teamwork</span></label>
          <label class="disc-card" data-c="water" onclick="disc(this,'q7')"><input type="radio" name="q7" value="D"><span class="icon">💧</span><span class="ja">データ分析で最適戦略発見</span><span class="en">Data-driven strategy</span></label>
        </div>
      </div>

      <div class="q-block">
        <p class="q-title">Q2. 壁にぶつかった時あなたは？</p>
        <p class="q-sub">When you hit a wall, you:</p>
        <div class="disc-grid">
          <label class="disc-card" data-c="fire" onclick="disc(this,'q8')"><input type="radio" name="q8" value="A" required><span class="icon">🔥</span><span class="ja">自分で判断して突き進む</span><span class="en">Push through</span></label>
          <label class="disc-card" data-c="wind" onclick="disc(this,'q8')"><input type="radio" name="q8" value="B"><span class="icon">🌀</span><span class="ja">周りに相談しエネルギーを得る</span><span class="en">Talk to others</span></label>
          <label class="disc-card" data-c="earth" onclick="disc(this,'q8')"><input type="radio" name="q8" value="C"><span class="icon">🌿</span><span class="ja">状況を見守りタイミングを待つ</span><span class="en">Wait for timing</span></label>
          <label class="disc-card" data-c="water" onclick="disc(this,'q8')"><input type="radio" name="q8" value="D"><span class="icon">💧</span><span class="ja">原因を徹底分析してから動く</span><span class="en">Analyze first</span></label>
        </div>
      </div>

      <div class="q-block">
        <p class="q-title">Q3. あなたを一言で表すなら？</p>
        <p class="q-sub">In one word, you are:</p>
        <div class="disc-grid">
          <label class="disc-card" data-c="fire" onclick="disc(this,'q9')"><input type="radio" name="q9" value="A" required><span class="icon">🔥</span><span class="ja">挑戦者</span><span class="en">Challenger</span></label>
          <label class="disc-card" data-c="wind" onclick="disc(this,'q9')"><input type="radio" name="q9" value="B"><span class="icon">🌀</span><span class="ja">ムードメーカー</span><span class="en">Energizer</span></label>
          <label class="disc-card" data-c="earth" onclick="disc(this,'q9')"><input type="radio" name="q9" value="C"><span class="icon">🌿</span><span class="ja">縁の下の力持ち</span><span class="en">Supporter</span></label>
          <label class="disc-card" data-c="water" onclick="disc(this,'q9')"><input type="radio" name="q9" value="D"><span class="icon">💧</span><span class="ja">分析家</span><span class="en">Analyst</span></label>
        </div>
      </div>
    </div>

    <button type="submit" class="submit-btn" id="btn">回答を送信 / Submit</button>
  </form>

  <div class="loading" id="loading"><div class="spinner"></div><p>送信中...</p></div>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbxinT85Mq5KSEJyujQs_OI0-hzM1vALHOjg9ICjv8jdjdJjTFYMIq4boKLbHNqJfPX8/exec';

const IND={
  '建設・不動産':['建築設計・施工','リフォーム・リノベーション','不動産売買','不動産賃貸・管理','インテリア・内装','外構・エクステリア','電気・設備工事'],
  'IT・デジタル':['Web制作・デザイン','システム開発','AI・DX支援','SNSマーケティング','動画制作・映像','IT機器・サポート'],
  '士業・コンサル':['弁護士','税理士・会計士','社会保険労務士','行政書士','司法書士','中小企業診断士','経営コンサルティング','人材・組織コンサルティング'],
  '金融・保険':['生命保険','損害保険','ファイナンシャルプランナー','融資・資金調達','投資・資産運用'],
  '美容・健康':['美容室・ヘアサロン','エステ・リラクゼーション','整体・鍼灸・接骨','パーソナルトレーニング','歯科','医療・クリニック'],
  '飲食・食品':['飲食店経営','ケータリング・仕出し','食品製造・販売'],
  '教育・研修':['語学・翻訳','研修・セミナー','コーチング','学習塾・スクール'],
  'クリエイティブ':['グラフィックデザイン','写真・映像','ライティング・編集','印刷・出版'],
  '生活サービス':['清掃・ハウスクリーニング','引越し・物流','冠婚葬祭','ペット関連','自動車販売・整備'],
  'その他':['人材紹介・派遣','広告・PR','通信・インフラ','その他']
};

document.addEventListener('DOMContentLoaded',()=>{
  const tabs=document.getElementById('ind-tabs'), grid=document.getElementById('ind-grid');
  Object.keys(IND).forEach(g=>{
    const t=document.createElement('button'); t.type='button'; t.className='ind-tab'; t.textContent=g;
    t.onclick=()=>selTab(g); tabs.appendChild(t);
  });
  Object.entries(IND).forEach(([g,items])=>{
    items.forEach(n=>{
      const d=document.createElement('div'); d.className='ind-item hidden'; d.dataset.g=g; d.textContent=n;
      d.onclick=()=>selInd(n,d); grid.appendChild(d);
    });
  });
  selTab(Object.keys(IND)[0]);
});

function selTab(g){
  document.querySelectorAll('.ind-tab').forEach(t=>t.classList.toggle('active',t.textContent===g));
  document.querySelectorAll('.ind-item').forEach(i=>{ i.classList.toggle('hidden',i.dataset.g!==g); });
}
function selInd(n,el){
  document.querySelectorAll('.ind-item').forEach(i=>i.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('ind-val').value=n;
  const c=document.getElementById('ind-chosen'); c.classList.add('visible');
  document.getElementById('ind-chosen-text').textContent='✓ '+n;
}
function clearIndustry(){
  document.getElementById('ind-val').value='';
  document.getElementById('ind-chosen').classList.remove('visible');
  document.querySelectorAll('.ind-item').forEach(i=>i.classList.remove('selected'));
}

function tgtToggle(el){
  const cb=el.querySelector('input');
  if(!el.classList.contains('checked')&&document.querySelectorAll('.target-chip.checked').length>=3) return;
  cb.checked=!cb.checked; el.classList.toggle('checked',cb.checked);
}

function disc(el,name){
  const grid=el.closest('.disc-grid');
  grid.querySelectorAll('.disc-card').forEach(c=>{c.className='disc-card'; c.dataset.c&&c.classList.add();});
  // reset all
  grid.querySelectorAll('.disc-card').forEach(c=>{ c.className='disc-card'; });
  el.classList.add('disc-card','sel-'+el.dataset.c);
  el.querySelector('input').checked=true;
}

function send(e){
  e.preventDefault();
  const f=document.getElementById('form'), ma=document.getElementById('msg-area');
  ma.innerHTML='';
  const d=new FormData(f), ind=document.getElementById('ind-val').value;
  if(!ind){ ma.innerHTML='<div class="msg error">業種を選択してください</div>'; return false; }
  const tgts=d.getAll('tgt');
  if(!tgts.length){ ma.innerHTML='<div class="msg error">ターゲット顧客層を選択してください</div>'; return false; }

  document.getElementById('btn').disabled=true; f.style.display='none';
  document.getElementById('loading').classList.add('active');

  const p={name:d.get('name'),chapter:d.get('chapter'),category:d.get('category'),phone:d.get('phone'),industry:ind,target_customers:tgts.join(', '),q7:d.get('q7'),q8:d.get('q8'),q9:d.get('q9')};

  fetch(GAS_URL,{method:'POST',body:new URLSearchParams(p),headers:{'Content-Type':'application/x-www-form-urlencoded'}})
  .then(r=>r.json()).then(res=>{
    document.getElementById('loading').classList.remove('active');
    if(res.success){
      const dc=res.disc||{};
      window.location.href=`result.html?name=${encodeURIComponent(p.name)}&disc_emoji=${encodeURIComponent(dc.emoji||'')}&disc_label=${encodeURIComponent(dc.label||'')}`;
    } else { f.style.display='block'; document.getElementById('btn').disabled=false; ma.innerHTML=`<div class="msg error">${res.error||'送信に失敗しました'}</div>`; }
  }).catch(err=>{
    document.getElementById('loading').classList.remove('active');
    f.style.display='block'; document.getElementById('btn').disabled=false;
    ma.innerHTML=`<div class="msg error">通信エラー: ${err.message}</div>`;
  });
  return false;
}
</script>
</body>
</html>
