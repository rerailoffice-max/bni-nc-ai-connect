<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Connect — グループ確認</title>
<style>
  :root {
    --bg: #121318; --card: #1B1D24; --card-raised: #22252E;
    --text: #EAEAEA; --text-dim: #8B8FA0; --text-muted: #555A6E;
    --border: #2A2D38; --input-bg: #16181E;
    --accent: #CF2030; --gold: #C9A84C; --gold-glow: rgba(201,168,76,0.12);
    --fire: #E8453C; --fire-bg: rgba(232,69,60,0.1); --fire-text: #FF7A72;
    --wind: #4A9EF5; --wind-bg: rgba(74,158,245,0.1); --wind-text: #7AB8FF;
    --earth: #E8A830; --earth-bg: rgba(232,168,48,0.1); --earth-text: #FFC44D;
    --water: #45B36B; --water-bg: rgba(69,179,107,0.1); --water-text: #6DD898;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: "Helvetica Neue","Hiragino Sans","Noto Sans JP",sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    text-align: center; padding: 28px 20px 16px;
    background: linear-gradient(180deg, rgba(207,32,48,0.08) 0%, transparent 60%);
  }
  .header h1 {
    font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .container { max-width: 520px; margin: 0 auto; padding: 0 16px 40px; }

  /* 回答完了 */
  .thank-you { text-align: center; padding: 24px 0; display: none; }
  .thank-you.visible { display: block; }
  .thank-you .disc-result { font-size: 2.8rem; margin-bottom: 8px; }
  .thank-you .disc-label { font-size: 1.1rem; font-weight: 700; color: var(--gold); margin-bottom: 16px; }
  .thank-you .msg { color: var(--text-dim); font-size: 0.88rem; line-height: 1.7; }

  /* 検索 */
  .search-section { margin-top: 16px; }
  .search-box {
    width: 100%; padding: 16px 20px; border-radius: 14px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text); font-size: 1.05rem; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(207,32,48,0.15); }
  .search-box::placeholder { color: var(--text-muted); }
  .search-hint { font-size: 0.72rem; color: var(--text-muted); margin-top: 8px; text-align: center; }

  /* ローディング */
  .loading { display: none; text-align: center; padding: 32px; }
  .loading.active { display: block; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 待機状態 */
  .not-ready { text-align: center; padding: 40px 20px; display: none; }
  .not-ready.visible { display: block; }
  .not-ready .icon { font-size: 2.8rem; margin-bottom: 16px; }
  .not-ready h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: 10px; color: var(--gold); }
  .not-ready p { color: var(--text-dim); font-size: 0.88rem; line-height: 1.7; }

  /* 結果 */
  .result { display: none; animation: fadeIn 0.5s ease-out; }
  .result.visible { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  .result-group-number {
    font-size: 3.2rem; font-weight: 900; text-align: center; line-height: 1.1; margin: 20px 0 4px;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .result-group-name { text-align: center; font-size: 0.95rem; color: var(--gold); font-weight: 600; margin-bottom: 4px; }
  .result-table { text-align: center; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 20px; }
  .result-person-badge { text-align: center; margin-bottom: 20px; }

  .disc-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 14px; border-radius: 100px; font-size: 0.8rem; font-weight: 700;
  }
  .disc-badge.fire { background: var(--fire-bg); color: var(--fire-text); }
  .disc-badge.wind { background: var(--wind-bg); color: var(--wind-text); }
  .disc-badge.earth { background: var(--earth-bg); color: var(--earth-text); }
  .disc-badge.water { background: var(--water-bg); color: var(--water-text); }

  .result-card {
    background: var(--card); border-radius: 18px; padding: 20px;
    border: 1px solid var(--border); margin-bottom: 16px;
  }
  .result-card h3 { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 12px; }

  .member-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 10px; margin-bottom: 4px;
    background: var(--card-raised);
  }
  .member-item.highlight {
    background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2);
  }
  .member-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.78rem; font-weight: 700; flex-shrink: 0; color: #fff;
  }
  .member-info { flex: 1; min-width: 0; }
  .member-name { font-size: 0.85rem; font-weight: 700; }
  .member-meta { font-size: 0.7rem; color: var(--text-dim); }
  .member-industry {
    display: inline-block; background: rgba(207,32,48,0.08); color: var(--fire-text);
    padding: 2px 8px; border-radius: 100px; font-size: 0.66rem; font-weight: 600; white-space: nowrap;
  }

  .table-divider {
    font-size: 0.7rem; color: var(--text-muted); margin: 10px 0 6px;
    padding: 3px 10px; background: var(--input-bg); border-radius: 6px; display: inline-block;
  }

  .synergy-box {
    background: var(--gold-glow); border: 1px solid rgba(201,168,76,0.18);
    border-radius: 14px; padding: 16px; margin-top: 12px;
  }
  .synergy-box h4 { font-size: 0.85rem; color: var(--gold); margin-bottom: 6px; }
  .synergy-box p { font-size: 0.8rem; color: var(--gold); opacity: 0.8; line-height: 1.5; }

  .no-result { text-align: center; color: var(--text-dim); padding: 32px; display: none; font-size: 0.88rem; }

  .back-link {
    display: block; text-align: center; margin-top: 28px;
    color: var(--text-muted); font-size: 0.82rem; text-decoration: none;
  }
  .back-link:hover { color: var(--gold); }

  .disc-bar { display: flex; gap: 3px; height: 6px; border-radius: 3px; overflow: hidden; margin: 8px 0; }
  .disc-bar-seg { height: 100%; }
  .disc-bar-seg.fire { background: var(--fire); }
  .disc-bar-seg.wind { background: var(--wind); }
  .disc-bar-seg.earth { background: var(--earth); }
  .disc-bar-seg.water { background: var(--water); }
  .disc-bar-labels { display: flex; gap: 12px; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 12px; }
  .disc-bar-labels span { display: flex; align-items: center; gap: 3px; }
  .disc-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
</style>
</head>
<body>

<div class="header"><h1>AI Connect</h1></div>

<div class="container">
  <div class="thank-you" id="thank-you">
    <div class="disc-result" id="disc-emoji"></div>
    <div class="disc-label" id="disc-label-text"></div>
    <p class="msg">回答ありがとうございます！<br>Thank you for your response!<br><br>下の検索からグループを確認できます。<br><small>※グループ発表後に結果が表示されます</small></p>
  </div>

  <div class="search-section">
    <input class="search-box" id="search-input" type="text" placeholder="名前 or 電話番号..." oninput="debounceSearch()">
    <p class="search-hint">名前（部分一致）または電話番号の下4桁で検索</p>
  </div>

  <div class="loading" id="loading"><div class="spinner"></div><p style="color:var(--text-dim);font-size:0.85rem">検索中...</p></div>

  <div class="not-ready" id="not-ready">
    <div class="icon">⏳</div>
    <h2>グループ発表をお楽しみに！</h2>
    <p>マッチング結果はまだ準備中です。<br>当日の発表をお楽しみに！<br><br>Results are being prepared.<br>Stay tuned!</p>
  </div>

  <div class="result" id="result"></div>
  <div class="no-result" id="no-result">該当する参加者が見つかりません</div>

  <a href="landing.html" class="back-link">← トップに戻る</a>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbxinT85Mq5KSEJyujQs_OI0-hzM1vALHOjg9ICjv8jdjdJjTFYMIq4boKLbHNqJfPX8/exec';
let st=null;

document.addEventListener('DOMContentLoaded',()=>{
  const p=new URLSearchParams(location.search);
  if(p.get('name')){
    document.getElementById('thank-you').classList.add('visible');
    const e=p.get('disc_emoji'), l=p.get('disc_label');
    if(e) document.getElementById('disc-emoji').textContent=e;
    if(l) document.getElementById('disc-label-text').textContent='あなたの行動タイプ: '+l;
    document.getElementById('search-input').value=p.get('name');
    setTimeout(doSearch,500);
  }
});

function debounceSearch(){clearTimeout(st);st=setTimeout(doSearch,400);}

function doSearch(){
  const q=document.getElementById('search-input').value.trim();
  const ld=document.getElementById('loading'),rs=document.getElementById('result'),nr=document.getElementById('no-result'),np=document.getElementById('not-ready');
  rs.classList.remove('visible');nr.style.display='none';np.classList.remove('visible');
  if(!q||q.length<2)return;
  ld.classList.add('active');
  fetch(`${GAS_URL}?action=check&query=${encodeURIComponent(q)}`)
  .then(r=>r.json()).then(d=>{
    ld.classList.remove('active');
    if(d.status==='not_ready'){np.classList.add('visible');return;}
    if(!d.found){nr.style.display='block';return;}
    render(d);
  }).catch(()=>{ld.classList.remove('active');np.classList.add('visible');});
}

function render(data){
  const el=document.getElementById('result'),ps=data.person,gr=data.group,ms=data.members||[];
  function dc(l){if(!l)return'';if(l.startsWith('炎'))return'fire';if(l.startsWith('風'))return'wind';if(l.startsWith('大地'))return'earth';if(l.startsWith('水'))return'water';return'';}
  function de(l){if(!l)return'✨';if(l.startsWith('炎'))return'🔥';if(l.startsWith('風'))return'🌀';if(l.startsWith('大地'))return'🌿';if(l.startsWith('水'))return'💧';return'✨';}

  const cnt={D:0,I:0,S:0,C:0};
  ms.forEach(m=>{const c=dc(m.disc_label);if(c==='fire')cnt.D++;else if(c==='wind')cnt.I++;else if(c==='earth')cnt.S++;else if(c==='water')cnt.C++;});
  const tot=cnt.D+cnt.I+cnt.S+cnt.C;

  const tbs={};ms.forEach(m=>{const t=m.table_number||1;if(!tbs[t])tbs[t]=[];tbs[t].push(m);});

  let mh='';
  Object.entries(tbs).sort((a,b)=>a[0]-b[0]).forEach(([tn,mems])=>{
    mh+=`<div class="table-divider">Table ${tn}</div>`;
    mems.forEach(m=>{
      const me=m.name===ps.name,c=dc(m.disc_label);
      const bg=c?`style="background:var(--${c})"`:'style="background:var(--accent)"';
      mh+=`<div class="member-item ${me?'highlight':''}">
        <div class="member-avatar" ${bg}>${m.name.charAt(0)}</div>
        <div class="member-info"><div class="member-name">${m.name}${me?' 👈':''}</div><div class="member-meta">${m.chapter||''}</div></div>
        ${m.disc_label?`<span class="disc-badge ${c}">${de(m.disc_label)} ${m.disc_label}</span>`:''}
        <span class="member-industry">${m.industry||''}</span>
      </div>`;
    });
  });

  const bar=tot>0?`<div class="disc-bar">
    <div class="disc-bar-seg fire" style="width:${cnt.D/tot*100}%"></div>
    <div class="disc-bar-seg wind" style="width:${cnt.I/tot*100}%"></div>
    <div class="disc-bar-seg earth" style="width:${cnt.S/tot*100}%"></div>
    <div class="disc-bar-seg water" style="width:${cnt.C/tot*100}%"></div>
  </div><div class="disc-bar-labels">
    <span><span class="disc-dot" style="background:var(--fire)"></span>🔥${cnt.D}</span>
    <span><span class="disc-dot" style="background:var(--wind)"></span>🌀${cnt.I}</span>
    <span><span class="disc-dot" style="background:var(--earth)"></span>🌿${cnt.S}</span>
    <span><span class="disc-dot" style="background:var(--water)"></span>💧${cnt.C}</span>
  </div>`:'';

  const pc=dc(ps.disc_label);
  el.innerHTML=`
    <div class="result-group-number">Group ${ps.group_number}</div>
    <div class="result-group-name">${gr.group_name||''}</div>
    <div class="result-table">Table ${ps.table_number}</div>
    <div class="result-person-badge"><span class="disc-badge ${pc}">${de(ps.disc_label)} ${ps.disc_label||''}</span></div>
    <div class="result-card"><h3>グループメンバー (${ms.length}名)</h3>${bar}${mh}</div>
    ${gr.synergy_reason?`<div class="synergy-box"><h4>💡 ${gr.group_name}</h4><p>${gr.synergy_reason}</p></div>`:''}`;
  el.classList.add('visible');
}
</script>
</body>
</html>
