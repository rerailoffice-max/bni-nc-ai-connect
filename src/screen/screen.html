<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Connect v2 — グループ配置発表</title>
<style>
  :root {
    --bni-red: #CF2030;
    --bni-red-dark: #A81A28;
    --bni-gold: #C9A84C;
    --bg: #0D0D0D;
    --card-bg: #1A1A1A;
    --text: #FFFFFF;
    --text-dim: #888888;
    --border: #333333;
    --fire: #CF2030; --fire-bg: rgba(207,32,48,0.15); --fire-text: #FF6B7A;
    --wind: #2196F3; --wind-bg: rgba(33,150,243,0.15); --wind-text: #64B5F6;
    --earth: #FFC107; --earth-bg: rgba(255,193,7,0.15); --earth-text: #FFD54F;
    --water: #4CAF50; --water-bg: rgba(76,175,80,0.15); --water-text: #81C784;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Helvetica Neue", "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden;
  }

  /* ナビ */
  .nav {
    position: fixed; top: 0; left: 0; right: 0;
    background: rgba(13,13,13,0.95); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px; display: flex; justify-content: space-between; align-items: center; z-index: 100;
  }
  .nav-brand { display: flex; align-items: center; gap: 12px; }
  .nav-brand .logo {
    width: 36px; height: 36px; background: var(--bni-red); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.9rem;
  }
  .nav-brand h1 { font-size: 1.1rem; font-weight: 700; }
  .nav-tabs { display: flex; gap: 4px; background: #222; border-radius: 10px; padding: 3px; }
  .nav-tab {
    padding: 8px 20px; border-radius: 8px; border: none; background: transparent;
    color: var(--text-dim); font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .nav-tab.active { background: var(--bni-red); color: var(--text); }
  .nav-info { font-size: 0.82rem; color: var(--text-dim); }

  .main { padding-top: 80px; }

  /* DISCバッジ */
  .disc-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 10px; border-radius: 100px; font-size: 0.75rem; font-weight: 700;
  }
  .disc-badge.fire { background: var(--fire-bg); color: var(--fire-text); }
  .disc-badge.wind { background: var(--wind-bg); color: var(--wind-text); }
  .disc-badge.earth { background: var(--earth-bg); color: var(--earth-text); }
  .disc-badge.water { background: var(--water-bg); color: var(--water-text); }

  /* DISC構成バー */
  .disc-bar { display: flex; gap: 4px; margin: 12px 0; height: 8px; border-radius: 4px; overflow: hidden; }
  .disc-bar-seg { height: 100%; }
  .disc-bar-seg.fire { background: var(--fire); }
  .disc-bar-seg.wind { background: var(--wind); }
  .disc-bar-seg.earth { background: var(--earth); }
  .disc-bar-seg.water { background: var(--water); }
  .disc-bar-labels { display: flex; gap: 16px; font-size: 0.78rem; color: var(--text-dim); margin-bottom: 16px; }
  .disc-bar-labels span { display: flex; align-items: center; gap: 4px; }
  .disc-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  /* Reveal関連 */
  .reveal-section {
    max-height: 0; overflow: hidden; opacity: 0;
    transition: max-height 0.8s ease, opacity 0.6s ease;
  }
  .reveal-section.revealed { max-height: 600px; opacity: 1; }

  .reveal-btn {
    display: block; margin: 24px auto 0; padding: 14px 40px; border-radius: 14px; border: 2px solid var(--bni-gold);
    background: transparent; color: var(--bni-gold); font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all 0.3s; letter-spacing: 0.05em;
  }
  .reveal-btn:hover { background: var(--bni-gold); color: #000; }
  .reveal-btn.revealed { display: none; }

  .synergy-box {
    background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25);
    border-radius: 14px; padding: 20px; margin-top: 16px;
  }
  .synergy-box h4 { font-size: 1rem; font-weight: 700; color: var(--bni-gold); margin-bottom: 8px; }
  .synergy-box p { font-size: 0.88rem; color: var(--bni-gold); line-height: 1.6; opacity: 0.9; }
  .synergy-box::before { content: "💡 "; }

  /* 発表モード */
  #presentation-mode {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: calc(100vh - 80px); padding: 40px;
  }
  .presentation-card {
    background: var(--card-bg); border-radius: 24px; padding: 40px 48px;
    max-width: 900px; width: 100%; border: 1px solid var(--border);
    animation: cardIn 0.6s ease-out; position: relative; overflow: hidden;
  }
  .presentation-card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--bni-red), var(--bni-gold));
  }
  .presentation-card.serendipity { border-color: var(--bni-gold); }
  .presentation-card.serendipity::before { background: linear-gradient(90deg, var(--bni-gold), #FFD700); }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes revealPulse {
    0% { box-shadow: 0 0 0 0 rgba(201,168,76,0.4); }
    70% { box-shadow: 0 0 0 12px rgba(201,168,76,0); }
    100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); }
  }
  .reveal-flash { animation: revealPulse 0.8s ease-out; }

  /* カウントダウン */
  .countdown-overlay {
    position: fixed; top:0; left:0; right:0; bottom:0; z-index: 200;
    background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .countdown-overlay.active { opacity: 1; pointer-events: auto; }
  .countdown-number {
    font-size: 12rem; font-weight: 900; color: var(--bni-gold);
    text-shadow: 0 0 60px rgba(201,168,76,0.5);
    animation: countPop 0.8s ease-out;
  }
  @keyframes countPop {
    0% { transform: scale(3); opacity: 0; }
    50% { transform: scale(0.9); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* 紙吹雪キャンバス */
  #confetti-canvas {
    position: fixed; top:0; left:0; width:100%; height:100%;
    pointer-events: none; z-index: 150;
  }

  /* Reveal時のグロー */
  .reveal-glow {
    animation: glowBurst 1.5s ease-out;
  }
  @keyframes glowBurst {
    0% { box-shadow: 0 0 0 0 rgba(201,168,76,0.6), 0 0 60px rgba(201,168,76,0.3); }
    50% { box-shadow: 0 0 0 20px rgba(201,168,76,0), 0 0 120px rgba(201,168,76,0.5); }
    100% { box-shadow: none; }
  }

  .group-number {
    font-size: 4rem; font-weight: 900;
    background: linear-gradient(135deg, var(--bni-red), var(--bni-gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1; margin-bottom: 4px;
  }
  .group-name { font-size: 1.2rem; font-weight: 600; color: var(--bni-gold); margin-bottom: 12px; }

  /* テーブルタブ */
  .table-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
  .table-tab {
    padding: 6px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); font-size: 0.82rem; font-weight: 600; cursor: pointer;
  }
  .table-tab.active { background: rgba(207,32,48,0.2); color: var(--fire-text); border-color: var(--bni-red); }

  .member-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }

  .member-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; background: rgba(255,255,255,0.03);
    border-radius: 10px; border: 1px solid rgba(255,255,255,0.05);
    animation: memberIn 0.4s ease-out; animation-fill-mode: both;
  }
  @keyframes memberIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .member-item:nth-child(1) { animation-delay: 0.05s; }
  .member-item:nth-child(2) { animation-delay: 0.1s; }
  .member-item:nth-child(3) { animation-delay: 0.15s; }
  .member-item:nth-child(4) { animation-delay: 0.2s; }
  .member-item:nth-child(5) { animation-delay: 0.25s; }
  .member-item:nth-child(6) { animation-delay: 0.3s; }
  .member-item:nth-child(7) { animation-delay: 0.35s; }
  .member-item:nth-child(8) { animation-delay: 0.4s; }
  .member-item:nth-child(9) { animation-delay: 0.45s; }
  .member-item:nth-child(10) { animation-delay: 0.5s; }

  .member-item.highlight { background: rgba(201,168,76,0.15); border-color: var(--bni-gold); }

  .member-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; font-weight: 700; flex-shrink: 0;
    background: var(--bni-red); /* デフォルト。Reveal後にDISC色に変わる */
    transition: background 0.4s;
  }

  .member-info { flex: 1; min-width: 0; }
  .member-name { font-size: 0.95rem; font-weight: 700; }
  .member-meta { font-size: 0.78rem; color: var(--text-dim); margin-top: 1px; }
  .member-industry {
    display: inline-block; background: rgba(207,32,48,0.12); color: #FF6B7A;
    padding: 2px 8px; border-radius: 100px; font-size: 0.72rem; font-weight: 600; white-space: nowrap;
  }

  /* Reveal前は業種バッジも非表示にするオプション */
  .member-disc-badge { transition: opacity 0.4s; }

  /* コントロール */
  .presentation-controls { display: flex; gap: 12px; margin-top: 28px; justify-content: center; }
  .ctrl-btn {
    padding: 12px 28px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--card-bg); color: var(--text); font-size: 0.9rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .ctrl-btn:hover { border-color: var(--bni-red); }
  .ctrl-btn.primary { background: var(--bni-red); border-color: var(--bni-red); }
  .ctrl-btn.primary:hover { background: var(--bni-red-dark); }

  .progress-bar {
    width: 100%; max-width: 900px; height: 4px;
    background: var(--border); border-radius: 2px; margin-top: 20px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--bni-red), var(--bni-gold));
    border-radius: 2px; transition: width 0.3s ease;
  }
  .counter { font-size: 0.85rem; color: var(--text-dim); margin-top: 10px; }

  /* 一覧モード */
  #list-mode { display: none; padding: 32px; max-width: 1400px; margin: 0 auto; }
  .group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
  .group-card {
    background: var(--card-bg); border-radius: 16px; padding: 24px;
    border: 1px solid var(--border); transition: border-color 0.2s;
  }
  .group-card:hover { border-color: var(--bni-red); }
  .group-card.serendipity { border-color: var(--bni-gold); }
  .group-card-header {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .group-card-number { font-size: 1.6rem; font-weight: 900; color: var(--bni-red); }
  .group-card-name { font-size: 0.85rem; color: var(--bni-gold); font-weight: 600; }
  .group-card-members { display: flex; flex-direction: column; gap: 4px; }
  .group-card-member { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; padding: 3px 0; }
  .mini-avatar {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem; font-weight: 700; flex-shrink: 0;
  }
  .group-card-synergy {
    margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
    font-size: 0.78rem; color: var(--text-dim); line-height: 1.5;
  }
  .table-divider {
    font-size: 0.72rem; color: var(--text-dim); margin: 6px 0 4px;
    padding: 2px 8px; background: rgba(255,255,255,0.03); border-radius: 4px; display: inline-block;
  }

  /* 検索モード */
  #search-mode { display: none; padding: 32px; max-width: 600px; margin: 0 auto; }
  .search-box {
    width: 100%; padding: 16px 24px; border-radius: 16px;
    border: 2px solid var(--border); background: var(--card-bg);
    color: var(--text); font-size: 1.2rem; outline: none;
    transition: border-color 0.2s; margin-bottom: 24px;
  }
  .search-box:focus { border-color: var(--bni-red); }
  .search-box::placeholder { color: var(--text-dim); }
  .search-result { display: none; animation: cardIn 0.4s ease-out; }
  .search-result.visible { display: block; }
  .search-group-number {
    font-size: 5rem; font-weight: 900; text-align: center;
    background: linear-gradient(135deg, var(--bni-red), var(--bni-gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1.1; margin-bottom: 4px;
  }
  .search-label { text-align: center; font-size: 1rem; color: var(--text-dim); margin-bottom: 24px; }
  .no-result { text-align: center; color: var(--text-dim); padding: 40px; font-size: 1rem; display: none; }

  /* ウェルカム */
  .welcome {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: calc(100vh - 80px); text-align: center; padding: 40px;
  }
  .welcome h2 {
    font-size: 3rem; font-weight: 900;
    background: linear-gradient(135deg, var(--bni-red), var(--bni-gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 16px;
  }
  .welcome p { font-size: 1.2rem; color: var(--text-dim); margin-bottom: 40px; }
  .welcome .start-btn {
    padding: 16px 48px; border-radius: 16px; border: none;
    background: var(--bni-red); color: var(--text);
    font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: background 0.2s;
  }
  .welcome .start-btn:hover { background: var(--bni-red-dark); }

  @media (max-width: 768px) {
    .nav { padding: 10px 16px; flex-wrap: wrap; gap: 8px; }
    .nav-info { display: none; }
    .presentation-card { padding: 24px 20px; }
    .group-number { font-size: 3rem; }
    .group-grid { grid-template-columns: 1fr; }
    .search-group-number { font-size: 3.5rem; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand"><div class="logo">AI</div><h1>AI Connect</h1></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showMode('presentation')">発表</button>
    <button class="nav-tab" onclick="showMode('list')">一覧</button>
    <button class="nav-tab" onclick="showMode('search')">検索</button>
  </div>
  <div class="nav-info" id="nav-info"></div>
</nav>

<canvas id="confetti-canvas"></canvas>
<div class="countdown-overlay" id="countdown-overlay"><div class="countdown-number" id="countdown-num"></div></div>
<div class="main">
  <!-- 発表モード -->
  <div id="presentation-mode">
    <div class="welcome" id="welcome">
      <h2>AI Connect</h2>
      <p>パワーチーム × 行動特性 AIグループ編成</p>
      <button class="start-btn" onclick="startPresentation()">発表を開始する</button>
    </div>
    <div id="presentation-content" style="display:none;width:100%;max-width:900px;margin:0 auto">
      <div id="card-container"></div>
      <div class="presentation-controls">
        <button class="ctrl-btn" onclick="prevGroup()">← 前</button>
        <button class="ctrl-btn" onclick="toggleAutoPlay()" id="auto-btn">▶ 自動再生</button>
        <button class="ctrl-btn primary" onclick="nextGroup()">次 →</button>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
      <div class="counter" id="counter"></div>
    </div>
  </div>

  <!-- 一覧モード -->
  <div id="list-mode"><div class="group-grid" id="group-grid"></div></div>

  <!-- 検索モード -->
  <div id="search-mode">
    <input class="search-box" id="search-input" type="text" placeholder="名前 or 電話番号を入力 / Enter name or phone..." oninput="searchByNameOrPhone()">
    <div class="search-result" id="search-result"></div>
    <div class="no-result" id="no-result">該当する参加者が見つかりません / No participant found</div>
  </div>
</div>

<script>
// ===== データ読み込み =====
// 本番: GAS generateScreenData() の出力JSONを REAL_DATA に代入してからこのHTMLを開く
// デモ: REAL_DATA未定義ならデモデータを自動生成
const DATA = (typeof REAL_DATA !== 'undefined') ? REAL_DATA : generateDemoData();

function generateDemoData() {
  const lastNames = ["佐藤","鈴木","高橋","田中","伊藤","渡辺","山本","中村","小林","加藤","吉田","山田","佐々木","松本","井上","木村","林","斎藤","清水","山崎","森","池田","橋本","阿部","石川","前田","藤田","小川","岡田","後藤","長谷川","石井","村上","近藤","坂本","遠藤","青木","藤井","西村","福田","太田","三浦","岡本","松田","中川","中野","原田","小野","竹内","金子","和田","中山","石田","上田","柴田","宮崎","酒井","宮本","工藤","横山","高木","安藤","内田","谷口","大野","丸山","今井","河野","武田","藤原","杉山","増田","小島","平野","土屋","大塚","千葉","久保","菅原","岩崎","松井","木下","佐野","野口","菊地","杉本","渡部","古川","市川","望月","北村","吉川","片山","野村","新井","中田","桜井","浜田","三宅"];
  const firstNames = ["太郎","花子","健太","由美","大輔","美咲","陽子","翔太","麻衣","拓也","真由美","直樹","裕子","達也","恵子","雄一","智子","和也","理恵","俊介","綾子","修","明美","誠","久美子","浩二","裕太","恵美","啓介","千尋","隆司","沙織","正人","典子","康太","優子","剛","瞳","博","さくら","亮","美穂","哲也","彩","勇気","奈々","光","結衣","翼","舞"];
  const chapters = ["アンカー","ライジング","フェニックス","ドリーム","サクセス","風神","UKA","パイオニア","ビクトリー","フォルテ","レガシー","ジャンヌ","インフィニティ","ブリリアント","エクセレンス","アドバンス","トリニティ","グローリー","ネクサス","ホライズン","クレスト","サミット","ステラ","グランツ","フラッグ"];

  // パワーチーム テーマ別の業種セット
  const powerTeams = [

// ===== ヘルパー =====
function discBadge(m) {
  if (!m.disc_css) return `<span class="disc-badge" style="background:rgba(201,168,76,0.15);color:var(--bni-gold)">${m.disc_emoji} ${m.disc_label}</span>`;
  return `<span class="disc-badge ${m.disc_css}">${m.disc_emoji} ${m.disc_label}</span>`;
}

function discBarHtml(bal) {
  if (!bal) return '';
  const t = bal.D+bal.I+bal.S+bal.C;
  if (!t) return '';
  return `<div class="disc-bar">
    <div class="disc-bar-seg fire" style="width:${bal.D/t*100}%"></div>
    <div class="disc-bar-seg wind" style="width:${bal.I/t*100}%"></div>
    <div class="disc-bar-seg earth" style="width:${bal.S/t*100}%"></div>
    <div class="disc-bar-seg water" style="width:${bal.C/t*100}%"></div>
  </div>
  <div class="disc-bar-labels">
    <span><span class="disc-dot" style="background:var(--fire)"></span>🔥${bal.D}</span>
    <span><span class="disc-dot" style="background:var(--wind)"></span>🌀${bal.I}</span>
    <span><span class="disc-dot" style="background:var(--earth)"></span>🌿${bal.S}</span>
    <span><span class="disc-dot" style="background:var(--water)"></span>💧${bal.C}</span>
  </div>`;
}

// 発表モード用: Reveal前はDISCバッジ非表示、名前+チャプター+業種のみ
function memberHtmlSimple(m) {
  return `<div class="member-item">
    <div class="member-avatar">${m.name.charAt(0)}</div>
    <div class="member-info"><div class="member-name">${m.name}</div><div class="member-meta">${m.chapter}</div></div>
    <span class="member-industry">${m.industry}</span>
  </div>`;
}

// Reveal後 / 一覧 / 検索用: フル情報
function memberHtmlFull(m, opts={}) {
  const hl = opts.highlight ? ' highlight' : '';
  const avCss = m.disc_css || '';
  const avStyle = avCss ? '' : 'style="background:var(--bni-gold)"';
  return `<div class="member-item${hl}">
    <div class="member-avatar ${avCss}" ${avStyle}>${m.name.charAt(0)}</div>
    <div class="member-info"><div class="member-name">${m.name}</div><div class="member-meta">${m.chapter}</div></div>
    <span class="member-disc-badge">${discBadge(m)}</span>
    <span class="member-industry">${m.industry}</span>
  </div>`;
}

function getAllGroups() {
  const all = [...DATA.groups];
  if (DATA.serendipity_group) {
    const sm = DATA.serendipity_group.tables.flatMap(t=>t.members);
    if (sm.length > 0) {
      all.push({ group_number:"✨", group_name:DATA.serendipity_group.group_name, disc_balance:null, tables:DATA.serendipity_group.tables, synergy_reason:"運命が引き寄せた予期せぬ出会い。ここから新しいビジネスが生まれるかもしれません", disc_comment:null, _isSerendipity:true });
    }
  }
  return all;
}

// ===== 状態 =====
let currentGroupIndex = 0;
let autoPlayInterval = null;
let currentTableTab = 0;
let revealedGroups = new Set(); // Reveal済みグループ

// ===== 初期化 =====
document.addEventListener('DOMContentLoaded', () => {
  const total = DATA.groups.reduce((s,g)=>s+g.tables.reduce((ss,t)=>ss+t.members.length,0),0);
  const seren = DATA.serendipity_group ? DATA.serendipity_group.tables.reduce((s,t)=>s+t.members.length,0) : 0;
  document.getElementById('nav-info').textContent = `${DATA.groups.length}グループ / ${total+seren}名`;
  buildListView();
  // ハッシュルーティング: #search でアクセスした場合は検索モードを表示
  if (window.location.hash === '#search') {
    showMode('search');
  }
});

// ===== モード切替 =====
function showMode(mode) {
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('presentation-mode').style.display = mode==='presentation' ? 'flex' : 'none';
  document.getElementById('list-mode').style.display = mode==='list' ? 'block' : 'none';
  document.getElementById('search-mode').style.display = mode==='search' ? 'block' : 'none';
  if (mode==='search') setTimeout(()=>document.getElementById('search-input').focus(),100);
}

// ===== 発表モード =====
function startPresentation() {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('presentation-content').style.display = 'block';
  currentGroupIndex = 0; currentTableTab = 0;
  // 最初のグループも演出付きで表示
  showCountdown(() => {
    playSound('reveal');
    launchConfetti(2000);
    renderGroup(currentGroupIndex);
  });
}

function renderGroup(index) {
  const allGroups = getAllGroups();
  if (index<0 || index>=allGroups.length) return;
  const g = allGroups[index];
  const container = document.getElementById('card-container');
  const isSeren = g._isSerendipity;
  const isRevealed = revealedGroups.has(index);

  // テーブルタブ
  const tabsHtml = g.tables.length > 1 ? `<div class="table-tabs">
    ${g.tables.map((t,i)=>`<button class="table-tab ${i===currentTableTab?'active':''}" onclick="switchTableTab(${i})">Table ${t.table_number}</button>`).join('')}
    <button class="table-tab ${currentTableTab===-1?'active':''}" onclick="switchTableTab(-1)">全員</button>
  </div>` : '';

  // メンバー（Reveal前: シンプル / Reveal後: フル）
  let membersHtml;
  const renderFn = (isRevealed || isSeren) ? memberHtmlFull : memberHtmlSimple;
  if (currentTableTab === -1) {
    membersHtml = g.tables.map(t =>
      `<div class="table-divider">Table ${t.table_number}</div>` +
      t.members.map(m => renderFn(m)).join('')
    ).join('');
  } else {
    const table = g.tables[currentTableTab] || g.tables[0];
    membersHtml = table.members.map(m => renderFn(m)).join('');
  }

  // Revealセクション（非公開→ボタンクリックで表示）
  const revealSectionHtml = isSeren ? '' : `
    <button class="reveal-btn ${isRevealed?'revealed':''}" id="reveal-btn-${index}" onclick="revealGroup(${index})">🎉 Reveal! — このグループの秘密を公開</button>
    <div class="reveal-section ${isRevealed?'revealed':''}" id="reveal-section-${index}">
      ${g.disc_balance ? discBarHtml(g.disc_balance) : ''}
      <div class="synergy-box">
        <h4>パワーチーム: ${g.group_name}</h4>
        <p>${g.synergy_reason || ''}</p>
      </div>
      ${g.disc_comment ? `<div style="margin-top:12px;font-size:0.82rem;color:var(--text-dim)">${g.disc_comment}</div>` : ''}
    </div>
  `;

  container.innerHTML = `<div class="presentation-card ${isSeren?'serendipity':''}" id="pcard-${index}">
    <div class="group-number">${isSeren ? '✨' : 'Group '+g.group_number}</div>
    <div class="group-name">${isSeren ? g.group_name : (isRevealed ? g.group_name : '???')}</div>
    ${tabsHtml}
    <div class="member-list">${membersHtml}</div>
    ${isSeren ? `<div class="synergy-box"><p>${g.synergy_reason}</p></div>` : ''}
    ${revealSectionHtml}
  </div>`;

  const total = allGroups.length;
  document.getElementById('progress').style.width = `${(index+1)/total*100}%`;
  document.getElementById('counter').textContent = `Group ${index+1} / ${total}`;
}

function revealGroup(index) {
  revealedGroups.add(index);
  playSound('fanfare');
  launchConfetti(3000);
  const card = document.getElementById('pcard-'+index);
  if (card) { card.classList.add('reveal-flash','reveal-glow'); }
  renderGroup(index);
}

function switchTableTab(i) { currentTableTab = i; renderGroup(currentGroupIndex); }

function nextGroup() {
  const all = getAllGroups();
  if (currentGroupIndex < all.length-1) {
    playSound('whoosh');
    showCountdown(() => {
      currentGroupIndex++; currentTableTab=0;
      playSound('reveal');
      launchConfetti(1500);
      renderGroup(currentGroupIndex);
    });
  }
}
function prevGroup() {
  if (currentGroupIndex > 0) { currentGroupIndex--; currentTableTab=0; renderGroup(currentGroupIndex); }
}

function toggleAutoPlay() {
  const btn = document.getElementById('auto-btn');
  if (autoPlayInterval) { clearInterval(autoPlayInterval); autoPlayInterval=null; btn.textContent='▶ 自動再生'; }
  else {
    autoPlayInterval = setInterval(()=>{
      const all = getAllGroups();
      if (currentGroupIndex < all.length-1) nextGroup();
      else { clearInterval(autoPlayInterval); autoPlayInterval=null; btn.textContent='▶ 自動再生'; }
    }, 5000);
    btn.textContent = '⏸ 停止';
  }
}

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight' || e.key===' ') { e.preventDefault(); nextGroup(); }
  if (e.key==='ArrowLeft') { e.preventDefault(); prevGroup(); }
  if (e.key==='r' || e.key==='R') { revealGroup(currentGroupIndex); }
});

// ===== 一覧モード（常にフル表示） =====
function buildListView() {
  const grid = document.getElementById('group-grid');
  grid.innerHTML = getAllGroups().map(g => {
    const isSeren = g._isSerendipity;
    const membersHtml = g.tables.map(t =>
      `<div class="table-divider">Table ${t.table_number}</div>` +
      t.members.map(m => `<div class="group-card-member">
        <div class="mini-avatar ${m.disc_css||''}" ${!m.disc_css?'style="background:var(--bni-gold)"':''}>${m.name.charAt(0)}</div>
        <span>${m.name}</span>
        ${discBadge(m)}
        <span style="color:var(--text-dim);font-size:0.72rem;margin-left:auto;white-space:nowrap">${m.industry}</span>
      </div>`).join('')
    ).join('');

    return `<div class="group-card ${isSeren?'serendipity':''}">
      <div class="group-card-header">
        <span class="group-card-number">${isSeren?'✨':'#'+g.group_number}</span>
        <span class="group-card-name">${g.group_name||''}</span>
      </div>
      ${g.disc_balance ? discBarHtml(g.disc_balance) : ''}
      <div class="group-card-members">${membersHtml}</div>
      ${g.synergy_reason ? `<div class="group-card-synergy">💡 ${g.synergy_reason}</div>` : ''}
    </div>`;
  }).join('');
}

// ===== 効果音（Web Audio API — 外部ファイル不要） =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudio() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }

function playSound(type) {
  try {
    const ctx = getAudio();
    if (type === 'whoosh') {
      // シュッという風切り音
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 0.3);
    } else if (type === 'reveal') {
      // ジャジャーン！上昇音
      [0, 0.1, 0.2].forEach((delay, i) => {
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime([523, 659, 784][i], ctx.currentTime + delay);
        gain.gain.setValueAtTime(0.25, ctx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + delay + 0.5);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(ctx.currentTime + delay); osc.stop(ctx.currentTime + delay + 0.5);
      });
    } else if (type === 'fanfare') {
      // ファンファーレ（豪華版）
      const notes = [523, 659, 784, 1047, 784, 1047];
      const times = [0, 0.12, 0.24, 0.36, 0.55, 0.7];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = i < 4 ? 'triangle' : 'sine';
        osc.frequency.setValueAtTime(freq, ctx.currentTime + times[i]);
        gain.gain.setValueAtTime(0.3, ctx.currentTime + times[i]);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + times[i] + 0.4);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(ctx.currentTime + times[i]); osc.stop(ctx.currentTime + times[i] + 0.4);
      });
    } else if (type === 'countdown') {
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 0.15);
    }
  } catch(e) {}
}

// ===== カウントダウン =====
function showCountdown(callback) {
  const overlay = document.getElementById('countdown-overlay');
  const numEl = document.getElementById('countdown-num');
  overlay.classList.add('active');
  let count = 3;
  numEl.textContent = count;
  numEl.style.animation = 'none'; void numEl.offsetHeight; numEl.style.animation = 'countPop 0.8s ease-out';
  playSound('countdown');

  const interval = setInterval(() => {
    count--;
    if (count > 0) {
      numEl.textContent = count;
      numEl.style.animation = 'none'; void numEl.offsetHeight; numEl.style.animation = 'countPop 0.8s ease-out';
      playSound('countdown');
    } else {
      clearInterval(interval);
      overlay.classList.remove('active');
      callback();
    }
  }, 800);
}

// ===== 紙吹雪エンジン =====
function launchConfetti(duration) {
  const canvas = document.getElementById('confetti-canvas');
  const ctx2d = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;

  const colors = ['#CF2030','#C9A84C','#2196F3','#FFC107','#4CAF50','#FF6B7A','#64B5F6','#FFD54F','#81C784','#FF4081','#FFFFFF'];
  const pieces = [];
  const startTime = Date.now();

  for (let i = 0; i < 150; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 200,
      w: 6 + Math.random() * 8,
      h: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 4,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 10,
      opacity: 1
    });
  }

  function draw() {
    const elapsed = Date.now() - startTime;
    ctx2d.clearRect(0, 0, canvas.width, canvas.height);

    const fadeStart = duration * 0.7;
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.rotSpeed;
      p.vy += 0.05; // gravity
      if (elapsed > fadeStart) p.opacity = Math.max(0, 1 - (elapsed - fadeStart) / (duration * 0.3));

      ctx2d.save();
      ctx2d.translate(p.x, p.y);
      ctx2d.rotate(p.rot * Math.PI / 180);
      ctx2d.globalAlpha = p.opacity;
      ctx2d.fillStyle = p.color;
      ctx2d.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx2d.restore();
    });

    if (elapsed < duration) requestAnimationFrame(draw);
    else ctx2d.clearRect(0, 0, canvas.width, canvas.height);
  }
  requestAnimationFrame(draw);
}

// ===== 検索モード（名前 or 電話番号） =====
function searchByNameOrPhone() {
  const raw = document.getElementById('search-input').value.trim();
  const res = document.getElementById('search-result');
  const noRes = document.getElementById('no-result');
  if (!raw || raw.length < 2) { res.classList.remove('visible'); noRes.style.display='none'; return; }

  // 数字が多ければ電話番号検索、そうでなければ名前検索
  const digitsOnly = raw.replace(/[-\s+]/g,'');
  const isPhone = /^\d{3,}$/.test(digitsOnly);

  let found = null;
  for (const g of getAllGroups()) {
    for (const t of g.tables) {
      for (const m of t.members) {
        if (isPhone) {
          if (m.phone && m.phone.includes(digitsOnly)) { found = {group:g, table:t, member:m}; break; }
        } else {
          if (m.name && m.name.includes(raw)) { found = {group:g, table:t, member:m}; break; }
        }
      }
      if (found) break;
    }
    if (found) break;
  }

  if (found) {
    noRes.style.display='none';
    const isSeren = found.group._isSerendipity;
    const allMembers = found.group.tables.map(t =>
      `<div class="table-divider">Table ${t.table_number}</div>` +
      t.members.map(m => memberHtmlFull(m, {highlight: m.id===found.member.id})).join('')
    ).join('');

    res.innerHTML = `
      <div class="search-group-number">${isSeren?'✨':'Group '+found.group.group_number}</div>
      <div class="search-label">${found.member.name} さんのグループ ${discBadge(found.member)}</div>
      <div style="background:var(--card-bg);border-radius:16px;padding:20px;border:1px solid var(--border)">
        <h3 style="font-size:1rem;color:var(--bni-gold);margin-bottom:8px">${found.group.group_name||''}</h3>
        ${found.group.disc_balance ? discBarHtml(found.group.disc_balance) : ''}
        <div class="member-list">${allMembers}</div>
        ${found.group.synergy_reason ? `<div class="synergy-box"><p>${found.group.synergy_reason}</p></div>` : ''}
      </div>`;
    res.classList.add('visible');
  } else {
    res.classList.remove('visible');
    noRes.style.display = 'block';
  }
}
