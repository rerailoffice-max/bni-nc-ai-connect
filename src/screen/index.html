<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Connect — テーブル配置発表</title>
<style>
  :root {
    --bni-red: #CF2030;
    --bni-red-dark: #A81A28;
    --bni-gold: #C9A84C;
    --bg: #0D0D0D;
    --card-bg: #1A1A1A;
    --text: #FFFFFF;
    --text-dim: #888888;
    --border: #333333;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Helvetica Neue", "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== ナビゲーション ===== */
  .nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: rgba(13,13,13,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .nav-brand .logo {
    width: 36px;
    height: 36px;
    background: var(--bni-red);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 0.9rem;
  }

  .nav-brand h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .nav-tabs {
    display: flex;
    gap: 4px;
    background: #222;
    border-radius: 10px;
    padding: 3px;
  }

  .nav-tab {
    padding: 8px 20px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .nav-tab.active {
    background: var(--bni-red);
    color: var(--text);
  }

  .nav-info {
    font-size: 0.82rem;
    color: var(--text-dim);
  }

  /* ===== メインコンテンツ ===== */
  .main {
    padding-top: 80px;
  }

  /* ===== 発表モード ===== */
  #presentation-mode {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 80px);
    padding: 40px;
  }

  .presentation-card {
    background: var(--card-bg);
    border-radius: 24px;
    padding: 48px 56px;
    max-width: 800px;
    width: 100%;
    border: 1px solid var(--border);
    animation: cardIn 0.6s ease-out;
    position: relative;
    overflow: hidden;
  }

  .presentation-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--bni-red), var(--bni-gold));
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .table-number {
    font-size: 5rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--bni-red), var(--bni-gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 8px;
  }

  .table-theme {
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--bni-gold);
    margin-bottom: 32px;
  }

  .member-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 28px;
  }

  .member-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    animation: memberIn 0.4s ease-out;
    animation-fill-mode: both;
  }

  @keyframes memberIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .member-item:nth-child(1) { animation-delay: 0.1s; }
  .member-item:nth-child(2) { animation-delay: 0.2s; }
  .member-item:nth-child(3) { animation-delay: 0.3s; }
  .member-item:nth-child(4) { animation-delay: 0.4s; }
  .member-item:nth-child(5) { animation-delay: 0.5s; }
  .member-item:nth-child(6) { animation-delay: 0.6s; }
  .member-item:nth-child(7) { animation-delay: 0.7s; }

  .member-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--bni-red);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .member-info {
    flex: 1;
  }

  .member-name {
    font-size: 1.1rem;
    font-weight: 700;
  }

  .member-meta {
    font-size: 0.82rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .member-industry {
    display: inline-block;
    background: rgba(207,32,48,0.15);
    color: #FF6B7A;
    padding: 2px 10px;
    border-radius: 100px;
    font-size: 0.78rem;
    font-weight: 600;
  }

  .synergy-reason {
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 0.9rem;
    color: var(--bni-gold);
    line-height: 1.6;
  }

  .synergy-reason::before {
    content: "💡 ";
  }

  /* コントロール */
  .presentation-controls {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    justify-content: center;
  }

  .ctrl-btn {
    padding: 12px 28px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .ctrl-btn:hover { border-color: var(--bni-red); }
  .ctrl-btn.primary { background: var(--bni-red); border-color: var(--bni-red); }
  .ctrl-btn.primary:hover { background: var(--bni-red-dark); }

  .progress-bar {
    width: 100%;
    max-width: 800px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 24px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--bni-red), var(--bni-gold));
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .counter {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-top: 12px;
  }

  /* ===== 一覧モード ===== */
  #list-mode {
    display: none;
    padding: 32px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .table-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  .table-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 24px;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }

  .table-card:hover {
    border-color: var(--bni-red);
  }

  .table-card-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .table-card-number {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--bni-red);
  }

  .table-card-theme {
    font-size: 0.88rem;
    color: var(--bni-gold);
    font-weight: 600;
  }

  .table-card-members {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .table-card-member {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.88rem;
  }

  .mini-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--bni-red);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .table-card-synergy {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* ===== 検索モード ===== */
  #search-mode {
    display: none;
    padding: 32px;
    max-width: 600px;
    margin: 0 auto;
  }

  .search-box {
    width: 100%;
    padding: 16px 24px;
    border-radius: 16px;
    border: 2px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    font-size: 1.2rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 24px;
  }

  .search-box:focus {
    border-color: var(--bni-red);
  }

  .search-box::placeholder {
    color: var(--text-dim);
  }

  .search-result {
    display: none;
    animation: cardIn 0.4s ease-out;
  }

  .search-result.visible {
    display: block;
  }

  .search-table-number {
    font-size: 6rem;
    font-weight: 900;
    text-align: center;
    background: linear-gradient(135deg, var(--bni-red), var(--bni-gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .search-label {
    text-align: center;
    font-size: 1rem;
    color: var(--text-dim);
    margin-bottom: 32px;
  }

  .no-result {
    text-align: center;
    color: var(--text-dim);
    padding: 40px;
    font-size: 1rem;
    display: none;
  }

  /* ===== ウェルカム画面 ===== */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 80px);
    text-align: center;
    padding: 40px;
  }

  .welcome h2 {
    font-size: 3rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--bni-red), var(--bni-gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }

  .welcome p {
    font-size: 1.2rem;
    color: var(--text-dim);
    margin-bottom: 40px;
  }

  .welcome .start-btn {
    padding: 16px 48px;
    border-radius: 16px;
    border: none;
    background: var(--bni-red);
    color: var(--text);
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }

  .welcome .start-btn:hover { background: var(--bni-red-dark); }

  /* ===== レスポンシブ ===== */
  @media (max-width: 768px) {
    .nav { padding: 10px 16px; flex-wrap: wrap; gap: 8px; }
    .nav-info { display: none; }
    .presentation-card { padding: 28px 24px; }
    .table-number { font-size: 3.5rem; }
    .table-grid { grid-template-columns: 1fr; }
    .search-table-number { font-size: 4rem; }
  }
</style>
</head>
<body>

<!-- ナビゲーション -->
<nav class="nav">
  <div class="nav-brand">
    <div class="logo">AI</div>
    <h1>AI Connect</h1>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showMode('presentation')">発表</button>
    <button class="nav-tab" onclick="showMode('list')">一覧</button>
    <button class="nav-tab" onclick="showMode('search')">検索</button>
  </div>
  <div class="nav-info" id="nav-info"></div>
</nav>

<!-- メイン -->
<div class="main">

  <!-- 発表モード -->
  <div id="presentation-mode">
    <div class="welcome" id="welcome">
      <h2>AI Connect</h2>
      <p>コンタクトサークル自動編成システム</p>
      <button class="start-btn" onclick="startPresentation()">発表を開始する</button>
    </div>
    <div id="presentation-content" style="display:none;width:100%;max-width:800px;margin:0 auto">
      <div id="card-container"></div>
      <div class="presentation-controls">
        <button class="ctrl-btn" onclick="prevTable()">← 前</button>
        <button class="ctrl-btn" onclick="toggleAutoPlay()" id="auto-btn">▶ 自動再生</button>
        <button class="ctrl-btn primary" onclick="nextTable()">次 →</button>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
      <div class="counter" id="counter"></div>
    </div>
  </div>

  <!-- 一覧モード -->
  <div id="list-mode">
    <div class="table-grid" id="table-grid"></div>
  </div>

  <!-- 検索モード -->
  <div id="search-mode">
    <input class="search-box" id="search-input" type="text" placeholder="名前を入力してください..." oninput="searchName()">
    <div class="search-result" id="search-result"></div>
    <div class="no-result" id="no-result">該当する参加者が見つかりません</div>
  </div>

</div>

<script>
// ===== データ =====
// この変数にGASから出力されたJSONを埋め込む（またはAPIから取得）
// デモ用ダミーデータ（本番ではGASから出力されたJSONに差し替え）
const DATA = {"tables":[{"table_number":1,"theme":"住宅ワンストップ","members":[{"name":"佐藤 太郎","chapter":"アンカー","industry":"不動産売買"},{"name":"鈴木 花子","chapter":"ライジング","industry":"リフォーム・リノベーション"},{"name":"高橋 健太","chapter":"フェニックス","industry":"生命保険"},{"name":"田中 由美","chapter":"ドリーム","industry":"税理士・会計士"},{"name":"伊藤 大輔","chapter":"サクセス","industry":"インテリア・内装"}],"synergy_reason":"住宅購入者を起点に、リフォーム・保険・税務・内装の相互紹介チェーンを構築"},{"table_number":2,"theme":"中小企業の成長支援","members":[{"name":"渡辺 一郎","chapter":"風神","industry":"経営コンサルティング"},{"name":"山本 美咲","chapter":"UKA","industry":"Web制作・デザイン"},{"name":"中村 陽子","chapter":"パイオニア","industry":"融資・資金調達"},{"name":"小林 翔太","chapter":"ビクトリー","industry":"社会保険労務士"},{"name":"加藤 麻衣","chapter":"フォルテ","industry":"研修・セミナー"}],"synergy_reason":"中小企業経営者に対し、資金調達→Web強化→人材育成→労務管理を一気通貫で提案"},{"table_number":3,"theme":"美容×富裕層ライフスタイル","members":[{"name":"吉田 拓也","chapter":"レガシー","industry":"美容室・ヘアサロン"},{"name":"山田 真由美","chapter":"ジャンヌ","industry":"パーソナルトレーニング"},{"name":"佐々木 直樹","chapter":"インフィニティ","industry":"ファイナンシャルプランナー"},{"name":"松本 裕子","chapter":"ブリリアント","industry":"歯科"},{"name":"井上 達也","chapter":"エクセレンス","industry":"写真・映像"},{"name":"木村 恵子","chapter":"アドバンス","industry":"エステ・リラクゼーション"}],"synergy_reason":"富裕層・高所得者層への美と健康と資産管理を横断するライフスタイル提案"},{"table_number":4,"theme":"IT×クリエイティブ連合","members":[{"name":"林 雄一","chapter":"トリニティ","industry":"AI・DX支援"},{"name":"斎藤 智子","chapter":"グローリー","industry":"グラフィックデザイン"},{"name":"清水 和也","chapter":"ネクサス","industry":"SNSマーケティング"},{"name":"山崎 理恵","chapter":"アンカー","industry":"広告・PR"},{"name":"森 俊介","chapter":"ライジング","industry":"コーチング"}],"synergy_reason":"企業のブランディング案件でAI・デザイン・SNS・PRが連携して包括的な支援を提供"},{"table_number":5,"theme":"店舗オーナー支援チーム","members":[{"name":"池田 綾子","chapter":"フェニックス","industry":"飲食店経営"},{"name":"橋本 修","chapter":"ドリーム","industry":"損害保険"},{"name":"阿部 明美","chapter":"サクセス","industry":"行政書士"},{"name":"石川 誠","chapter":"風神","industry":"清掃・ハウスクリーニング"},{"name":"前田 久美子","chapter":"UKA","industry":"動画制作・映像"},{"name":"藤田 浩二","chapter":"パイオニア","industry":"建築設計・施工"}],"synergy_reason":"飲食・小売店舗の開業から運営まで、許認可・保険・施工・清掃・PR動画を一括サポート"}],"generated_at":"2026-03-29T22:00:00+09:00"};

// ===== 状態管理 =====
let currentTableIndex = 0;
let autoPlayInterval = null;

// ===== 初期化 =====
document.addEventListener('DOMContentLoaded', () => {
  if (DATA && DATA.tables) {
    document.getElementById('nav-info').textContent =
      `${DATA.tables.length}テーブル / ${DATA.tables.reduce((sum, t) => sum + t.members.length, 0)}名`;
    buildListView();
  }
});

// ===== モード切替 =====
function showMode(mode) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  document.getElementById('presentation-mode').style.display = mode === 'presentation' ? 'flex' : 'none';
  document.getElementById('list-mode').style.display = mode === 'list' ? 'block' : 'none';
  document.getElementById('search-mode').style.display = mode === 'search' ? 'block' : 'none';

  if (mode === 'search') {
    setTimeout(() => document.getElementById('search-input').focus(), 100);
  }
}

// ===== 発表モード =====
function startPresentation() {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('presentation-content').style.display = 'block';
  currentTableIndex = 0;
  renderTable(currentTableIndex);
}

function renderTable(index) {
  if (!DATA || !DATA.tables || index < 0 || index >= DATA.tables.length) return;

  const table = DATA.tables[index];
  const container = document.getElementById('card-container');

  const membersHtml = table.members.map(m => `
    <div class="member-item">
      <div class="member-avatar">${m.name.charAt(0)}</div>
      <div class="member-info">
        <div class="member-name">${m.name}</div>
        <div class="member-meta">${m.chapter || ''}</div>
      </div>
      <span class="member-industry">${m.industry}</span>
    </div>
  `).join('');

  container.innerHTML = `
    <div class="presentation-card">
      <div class="table-number">Table ${table.table_number}</div>
      <div class="table-theme">${table.theme || ''}</div>
      <div class="member-list">${membersHtml}</div>
      ${table.synergy_reason ? `<div class="synergy-reason">${table.synergy_reason}</div>` : ''}
    </div>
  `;

  // プログレスバー更新
  const progress = ((index + 1) / DATA.tables.length) * 100;
  document.getElementById('progress').style.width = `${progress}%`;
  document.getElementById('counter').textContent = `${index + 1} / ${DATA.tables.length}`;
}

function nextTable() {
  if (currentTableIndex < DATA.tables.length - 1) {
    currentTableIndex++;
    renderTable(currentTableIndex);
  }
}

function prevTable() {
  if (currentTableIndex > 0) {
    currentTableIndex--;
    renderTable(currentTableIndex);
  }
}

function toggleAutoPlay() {
  const btn = document.getElementById('auto-btn');
  if (autoPlayInterval) {
    clearInterval(autoPlayInterval);
    autoPlayInterval = null;
    btn.textContent = '▶ 自動再生';
  } else {
    autoPlayInterval = setInterval(() => {
      if (currentTableIndex < DATA.tables.length - 1) {
        nextTable();
      } else {
        clearInterval(autoPlayInterval);
        autoPlayInterval = null;
        btn.textContent = '▶ 自動再生';
      }
    }, 5000); // 5秒間隔
    btn.textContent = '⏸ 停止';
  }
}

// キーボードショートカット
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextTable(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevTable(); }
});

// ===== 一覧モード =====
function buildListView() {
  const grid = document.getElementById('table-grid');
  grid.innerHTML = DATA.tables.map(table => `
    <div class="table-card">
      <div class="table-card-header">
        <span class="table-card-number">#${table.table_number}</span>
        <span class="table-card-theme">${table.theme || ''}</span>
      </div>
      <div class="table-card-members">
        ${table.members.map(m => `
          <div class="table-card-member">
            <div class="mini-avatar">${m.name.charAt(0)}</div>
            <span>${m.name}</span>
            <span style="color:var(--text-dim);font-size:0.78rem;margin-left:auto">${m.industry}</span>
          </div>
        `).join('')}
      </div>
      ${table.synergy_reason ? `<div class="table-card-synergy">${table.synergy_reason}</div>` : ''}
    </div>
  `).join('');
}

// ===== 検索モード =====
function searchName() {
  const query = document.getElementById('search-input').value.trim();
  const resultDiv = document.getElementById('search-result');
  const noResultDiv = document.getElementById('no-result');

  if (!query) {
    resultDiv.classList.remove('visible');
    noResultDiv.style.display = 'none';
    return;
  }

  // 参加者を検索
  let found = null;
  for (const table of DATA.tables) {
    for (const member of table.members) {
      if (member.name.includes(query)) {
        found = { table, member };
        break;
      }
    }
    if (found) break;
  }

  if (found) {
    noResultDiv.style.display = 'none';
    const otherMembers = found.table.members
      .filter(m => m.name !== found.member.name)
      .map(m => `
        <div class="member-item" style="animation:none">
          <div class="member-avatar">${m.name.charAt(0)}</div>
          <div class="member-info">
            <div class="member-name">${m.name}</div>
            <div class="member-meta">${m.chapter || ''}</div>
          </div>
          <span class="member-industry">${m.industry}</span>
        </div>
      `).join('');

    resultDiv.innerHTML = `
      <div class="search-table-number">Table ${found.table.table_number}</div>
      <div class="search-label">${found.member.name} さんのテーブル</div>
      <div style="background:var(--card-bg);border-radius:16px;padding:24px;border:1px solid var(--border)">
        <h3 style="font-size:1rem;color:var(--bni-gold);margin-bottom:16px">${found.table.theme || ''}</h3>
        <div class="member-list">${otherMembers}</div>
        ${found.table.synergy_reason ? `<div class="synergy-reason">${found.table.synergy_reason}</div>` : ''}
      </div>
    `;
    resultDiv.classList.add('visible');
  } else {
    resultDiv.classList.remove('visible');
    noResultDiv.style.display = 'block';
  }
}
</script>

</body>
</html>
